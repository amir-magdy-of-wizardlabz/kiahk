name: release-maven

# Publishes com.wizardlabz:kiahk to Maven Central via the Sonatype Central
# Portal on every v*.*.* tag.
#
# Required GitHub Secrets:
#   MAVEN_CENTRAL_USERNAME    Sonatype Central Portal user token (NOT your account email)
#   MAVEN_CENTRAL_PASSWORD    Sonatype Central Portal user token password
#   GPG_PRIVATE_KEY           ASCII-armored GPG private key (one-line, paste the full
#                             "-----BEGIN PGP PRIVATE KEY BLOCK-----" ... "-----END..."
#                             with newlines preserved as `\n`)
#   GPG_PASSPHRASE            Passphrase for the GPG private key
#
# Generated via:
#   gpg --full-generate-key                  # RSA 4096, no expiry, ID = your email
#   gpg --list-secret-keys --keyid-format=long
#   gpg --armor --export-secret-keys <KEY_ID>   # → GPG_PRIVATE_KEY
#   gpg --armor --export <KEY_ID> | curl -T - https://keys.openpgp.org/   # publish public key
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.1.5)."
        required: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10"

      - name: Resolve release version
        id: ver
        shell: bash
        run: |
          REF="${{ github.event.inputs.tag || github.ref_name }}"
          TAG="${REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG"          >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"  >> "$GITHUB_OUTPUT"

      - name: Verify tag matches gradle.properties version
        shell: bash
        working-directory: kotlin
        run: |
          PROP_VERSION=$(awk -F= '/^version=/ {print $2}' gradle.properties | tr -d ' \r')
          if [ "$PROP_VERSION" != "${{ steps.ver.outputs.version }}" ]; then
            echo "::error::Tag version (${{ steps.ver.outputs.version }}) does not match kotlin/gradle.properties version ($PROP_VERSION)."
            echo "Bump kotlin/gradle.properties version first, commit, then re-tag."
            exit 1
          fi
          echo "Version match: $PROP_VERSION"

      - name: Build + test
        working-directory: kotlin
        run: gradle build --no-daemon --stacktrace

      - name: Publish to Maven Central
        working-directory: kotlin
        env:
          # vanniktech.maven.publish reads these env vars when present.
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSPHRASE }}
        # `publishAndReleaseToMavenCentral` uploads the bundle AND auto-releases
        # it (no manual button-press in the portal). Drop the trailing
        # `--no-configuration-cache` flag if you opt into Gradle's
        # configuration cache later.
        run: gradle publishAndReleaseToMavenCentral --no-daemon --no-configuration-cache --stacktrace

      - name: Summary
        if: success()
        run: |
          echo "### Published Kiahk ${{ steps.ver.outputs.version }} to Maven Central" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Maven Central: https://central.sonatype.com/artifact/com.wizardlabz/kiahk/${{ steps.ver.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Gradle: \`implementation(\"com.wizardlabz:kiahk:${{ steps.ver.outputs.version }}\")\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "(Note: Maven Central propagation to mirrors takes 10-30 minutes after publish.)" >> "$GITHUB_STEP_SUMMARY"
