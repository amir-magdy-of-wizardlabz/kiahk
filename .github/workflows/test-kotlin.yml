name: kotlin tests

on:
  push:
    branches: [master]
    paths:
      - "kotlin/**"
      - "core/**"
      - ".github/workflows/test-kotlin.yml"
  pull_request:
    branches: [master]
    paths:
      - "kotlin/**"
      - "core/**"
      - ".github/workflows/test-kotlin.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10"

      - name: Run tests
        working-directory: kotlin
        run: gradle test --no-daemon --stacktrace

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: kotlin-test-report
          path: kotlin/build/reports/tests/
