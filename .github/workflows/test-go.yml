name: go tests

on:
  push:
    branches: [master]
    paths:
      - "go/**"
      - "go.mod"
      - "go.sum"
      - "core/**"
      - ".github/workflows/test-go.yml"
  pull_request:
    branches: [master]
    paths:
      - "go/**"
      - "go.mod"
      - "go.sum"
      - "core/**"
      - ".github/workflows/test-go.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.22", "1.23"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      # go.mod is at repo root (module path:
      # github.com/amir-magdy-of-wizardlabz/kiahk). The package code lives
      # in go/ as a subpackage. Tests scope to ./go/... so future subpackages
      # aren't accidentally pulled in.
      - name: go vet
        run: go vet ./go/...

      - name: go test
        run: go test -v ./go/...
