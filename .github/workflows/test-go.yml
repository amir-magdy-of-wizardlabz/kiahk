name: go tests

on:
  push:
    branches: [master]
    paths:
      - "go/**"
      - "core/**"
      - ".github/workflows/test-go.yml"
  pull_request:
    branches: [master]
    paths:
      - "go/**"
      - "core/**"
      - ".github/workflows/test-go.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.22", "1.23"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: go vet
        working-directory: go
        run: go vet ./...

      - name: go test
        working-directory: go
        run: go test -v ./...
