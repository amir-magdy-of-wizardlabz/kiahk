name: csharp tests

on:
  push:
    branches: [master]
    paths:
      - "csharp/**"
      - "core/**"
      - "assets/**"
      - ".github/workflows/test-csharp.yml"
  pull_request:
    branches: [master]
    paths:
      - "csharp/**"
      - "core/**"
      - "assets/**"
      - ".github/workflows/test-csharp.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dotnet: ["6.0.x", "8.0.x"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET ${{ matrix.dotnet }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet }}

      - name: Restore
        working-directory: csharp
        run: dotnet restore

      - name: Build
        working-directory: csharp
        run: dotnet build --no-restore --configuration Release

      - name: Test
        working-directory: csharp
        run: dotnet test --no-build --configuration Release --verbosity normal

      - name: Pack
        working-directory: csharp
        run: dotnet pack --no-build --configuration Release Kiahk/Kiahk.csproj
